# HSS-HLR external LAN ipvlan NAD.
# TODO(vendor): confirm master (eth3), mode, IPAM, and any static routes.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: hsshlr-ipvlan
  namespace: cnf
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "hsshlr-ipvlan",
      "type": "ipvlan",
      "master": "eth3",
      "mode": "l2",
      "ipam": {
        "type": "whereabouts",
        "range": "10.20.6.0/26",
        "range_start": "10.20.6.10",
        "range_end": "10.20.6.60",
        "gateway": "10.20.6.1"
      }
    }
