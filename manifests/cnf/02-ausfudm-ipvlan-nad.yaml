# AUSF-UDM external LAN ipvlan NAD.
# TODO(vendor): confirm master (eth2), mode, IPAM, and any static routes the
# external LAN needs to reach the signalling peers. Example "routes" block is
# commented below — uncomment and set the vendor's destinations/gateways.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ausfudm-ipvlan
  namespace: cnf
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ausfudm-ipvlan",
      "type": "ipvlan",
      "master": "eth2",
      "mode": "l2",
      "ipam": {
        "type": "whereabouts",
        "range": "10.20.5.0/26",
        "range_start": "10.20.5.10",
        "range_end": "10.20.5.60",
        "gateway": "10.20.5.1"
      }
    }
