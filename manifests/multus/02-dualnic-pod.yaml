---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dualnic
  namespace: multus-demo
  labels:
    app: dualnic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dualnic
  template:
    metadata:
      labels:
        app: dualnic
      annotations:
        k8s.v1.cni.cncf.io/networks: macvlan-multus
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: dualnic
              topologyKey: kubernetes.io/hostname
      containers:
        - name: shell
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/bash", "-c", "sleep infinity"]
          securityContext:
            runAsNonRoot: false
            capabilities:
              add: ["NET_RAW", "NET_ADMIN"]
