---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-multus
  namespace: multus-demo
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "macvlan-multus",
      "type": "macvlan",
      "master": "eth1",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "10.20.2.0/23",
        "range_start": "10.20.3.1",
        "range_end": "10.20.3.254",
        "gateway": "10.20.2.1"
      }
    }
